name: CxPilot Nightly

on:
  schedule:
    - cron: '0 20 * * 0-4'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

jobs:
  nightly-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Check for changes since last successful nightly and trigger build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const mainRepo = context.repo.repo;

            // Find the last successful run of THIS workflow
            const { data: runsData } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo: mainRepo,
              workflow_id: 'nightly.yml', // must match the actual filename
              status: 'success',
              per_page: 1,
            });

            let since;
            if (runsData.workflow_runs.length > 0) {
              since = runsData.workflow_runs[0].created_at;
              core.info(`Using last successful nightly at ${since} as baseline.`);
            } else {
              // No prior successful run; always trigger build
              since = new Date(0).toISOString();
              core.info(`No prior successful nightly found; triggering build.`);
            }

            // Get default branch
            const { data: repoData } = await github.rest.repos.get({ owner, repo: mainRepo });
            const defaultBranch = repoData.default_branch;
            core.info(`Default branch resolved as ${defaultBranch}`);

            const branches = [
              { repo: mainRepo,         branch: defaultBranch },
              { repo: 'cxpilot-core',   branch: defaultBranch },
              { repo: 'cxpilot-config', branch: defaultBranch },
            ];

            let changed = [];

            for (const { repo, branch } of branches) {
              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner,
                  repo,
                  sha: branch,
                  since,
                  per_page: 1,
                });

                if (commits.length > 0) {
                  changed.push(`${repo}@${branch}`);
                } else {
                  core.info(`No commits in ${repo}@${branch} since ${since}`);
                }
              } catch (err) {
                core.warning(`Failed to list commits for ${repo}@${branch}: ${err.message}`);
              }
            }

            if (changed.length === 0) {
              core.info(`No changes detected since last successful nightly; skipping build.`);
              return;
            }

            core.info(`Changes detected in: ${changed.join(', ')}`);
            core.info('Triggering CxPilot Build workflow for nightly artifacts.');

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo: mainRepo,
              workflow_id: 'cxpilot-build.yml', // keep in sync with the actual filename
              ref: defaultBranch,
            });
